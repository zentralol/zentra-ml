name: CI

on:
  push:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via Bastion Host
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          CONTAINER_NAME: zentra-ml
          HOST_PORT: "8000"
          CONTAINER_PORT: "8000"
          HEALTH_PATH: /
          HEALTH_RETRIES: "30"
          HEALTH_INTERVAL_SEC: "2"
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USERNAME }}
          proxy_key: ${{ secrets.PROXY_SSH_KEY }}
          envs: IMAGE,CONTAINER_NAME,HOST_PORT,CONTAINER_PORT,HEALTH_PATH,HEALTH_RETRIES,HEALTH_INTERVAL_SEC
          script: |
            set -euo pipefail

            log() { printf '[deploy] %s\n' "$*"; }
            die() { printf '[deploy] ERROR: %s\n' "$*" >&2; exit 1; }

            command -v docker >/dev/null 2>&1 || die "docker not found on VPS"
            command -v curl >/dev/null 2>&1 || die "curl not found on VPS"

            log "Pulling image: ${IMAGE}"
            docker pull "${IMAGE}"

            if docker ps -a --format '{{.Names}}' | grep -qx "${CONTAINER_NAME}"; then
              log "Stopping existing container: ${CONTAINER_NAME}"
              docker stop "${CONTAINER_NAME}" >/dev/null
              docker rm "${CONTAINER_NAME}" >/dev/null
            fi

            log "Starting container: ${CONTAINER_NAME}"
            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              -p "${HOST_PORT}:${CONTAINER_PORT}" \
              "${IMAGE}"

            HEALTH_URL="http://127.0.0.1:${HOST_PORT}${HEALTH_PATH}"
            log "Waiting for health check: ${HEALTH_URL}"

            for attempt in $(seq 1 "${HEALTH_RETRIES}"); do
              if response="$(curl -fsS "${HEALTH_URL}" 2>/dev/null)"; then
                if echo "${response}" | grep -q 'Zentra Crowd Prediction API is running'; then
                  log "Health check passed"
                  docker ps --filter "name=${CONTAINER_NAME}"
                  exit 0
                fi
                log "Health endpoint reachable but response unexpected (${attempt}/${HEALTH_RETRIES})"
              else
                log "Health check pending (${attempt}/${HEALTH_RETRIES})"
              fi
              sleep "${HEALTH_INTERVAL_SEC}"
            done

            log "Deployment failed health check. Recent container logs:"
            docker logs --tail 50 "${CONTAINER_NAME}" || true
            die "Health check did not pass"
